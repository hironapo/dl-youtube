async function loadRecentVideos() {
  const list = document.getElementById('recent-list');
  if (!list) return;
  const dates = await apiFetch('/api/dates');
  if (!dates || !dates.length) {
    list.innerHTML = '<div style="font-size:.82rem;color:var(--text-muted);padding:8px 0">動画なし。URLからダウンロードしてください。</div>';
    return;
  }
  list.innerHTML = '';
  let count = 0;
  for (const d of dates) {
    if (count >= 5) break;
    const videos = await apiFetch(`/api/dates/${d.date}/videos`);
    for (const v of (videos || [])) {
      if (count >= 5) break;
      const item = document.createElement('div');
      item.className = 'recent-item';
      item.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--navy);flex-shrink:0">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span class="recent-item-title" title="${esc(v.title)}">${esc(v.title)}</span>
        <span class="recent-item-date">${d.display}</span>`;
      item.onclick = async () => {
        showNav('dates');
        // 日付ツリーの該当グループを展開してから再生
        const header = [...document.querySelectorAll('.date-header')]
          .find(h => h.textContent.includes(d.display));
        if (header) {
          if (!header.classList.contains('open')) await toggleDate(header, d.date);
          else await loadVideosForDate(d.date);
        } else {
          await loadVideosForDate(d.date);
        }
        const vlist = document.getElementById(`vlist-${d.date}`);
        if (vlist) {
          for (const el of vlist.querySelectorAll('.video-item')) {
            if (el.querySelector('.video-item-title')?.textContent?.trim() === v.title) {
              el.click(); return;
            }
          }
        }
        openVideo(v, document.createElement('div'));
      };
      list.appendChild(item);
      count++;
    }
  }
}

// ─────────────────────────────────────────────
// 単語/フレーズ クリックポップアップ
// ─────────────────────────────────────────────
(function() {
  const popup = document.getElementById('word-popup');
  let _context = '';

  window.showWordPopup = function(word, cx, cy, context) {
    _context = context || '';
    document.getElementById('wp-word').textContent = word;
    popup.style.display = 'flex';
    // 画面端に収まるよう位置調整
    const pw = popup.offsetWidth || 200;
    const ph = popup.offsetHeight || 80;
    let left = cx + 8;
    let top  = cy + 8;
    if (left + pw > window.innerWidth  - 8) left = cx - pw - 8;
    if (top  + ph > window.innerHeight - 8) top  = cy - ph - 8;
    popup.style.left = Math.max(4, left) + 'px';
    popup.style.top  = Math.max(4, top)  + 'px';
  };

  document.getElementById('wp-btn-explain').onclick = () => {
    const word = document.getElementById('wp-word').textContent;
    popup.style.display = 'none';
    explainText(word, _context);
  };
  document.getElementById('wp-btn-register').onclick = () => {
    const word = document.getElementById('wp-word').textContent;
    popup.style.display = 'none';
    openAddPhraseModal(null, word);
  };
  // 外側クリックで閉じる
  document.addEventListener('mousedown', e => {
    if (!popup.contains(e.target)) popup.style.display = 'none';
  });
})();

// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
async function init() {
  await loadDates();
  loadWelcomeStats();
  loadRecentVideos();

  // URLハッシュに動画IDがあれば復元（F5リロード対応）
  const hash = location.hash;
  const m = hash.match(/[#&]v=([^&]+)/);
  if (m) {
    const videoId = decodeURIComponent(m[1]);
    // 全日付を検索して該当動画を開く
    const dates = await apiFetch('/api/dates');
    for (const d of (dates || [])) {
      const videos = await apiFetch(`/api/dates/${d.date}/videos`);
      const v = (videos || []).find(x => x.video_id === videoId);
      if (v) {
        const header = [...document.querySelectorAll('.date-header')]
          .find(h => h.dataset.date === d.date);
        if (header && !header.classList.contains('open')) {
          await toggleDate(header, d.date);
        }
        const itemEl = [...document.querySelectorAll('.video-item')]
          .find(el => el.dataset.videoId === videoId) || document.createElement('div');
        openVideo(v, itemEl);
        break;
      }
    }
  }
}

init();
</script>

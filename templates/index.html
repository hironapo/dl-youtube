<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 学習マネージャー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ─ カラーパレット（ビジネス系） ─ */
  --navy:       #003366;   /* メイン：ダークネイビー */
  --blue:       #0055AA;   /* セカンダリ：ロイヤルブルー */
  --lightblue:  #E8F4FC;   /* 背景アクセント：ライトブルー */
  --red:        #CC0000;   /* 強調①：重要・警告 */

  --bg-base:    #ffffff;
  --bg-surface: #f4f6f9;
  --bg-card:    #ffffff;
  --bg-hover:   #EBF3FB;
  --bg-active:  var(--lightblue);
  --border:     #c8d6e5;
  --border-mid: #a0b8d0;

  --accent:     var(--navy);
  --accent-dim: var(--lightblue);
  --accent2:    var(--blue);
  --danger:     var(--red);
  --warning:    #D4820A;
  --success:    #1a7a4a;

  --text:       #1a2a3a;
  --text-dim:   #3a5070;
  --text-muted: #7090aa;

  --sidebar-w:  255px;
  --header-h:   52px;
  --radius:     6px;
  --radius-sm:  4px;

  /* ヘッダー専用 */
  --header-bg:  var(--navy);
  --header-fg:  #ffffff;
}

body {
  font-family: 'Meiryo', 'Meiryo UI', 'Yu Gothic UI', 'Noto Sans JP', sans-serif;
  background: var(--bg-base);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ─── ヘッダー（ネイビー帯） ─── */
#header {
  height: var(--header-h);
  background: var(--header-bg);
  border-bottom: 3px solid var(--blue);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 20;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 1rem; color: #ffffff;
  white-space: nowrap; letter-spacing: .04em;
}
#header-title {
  flex: 1; font-size: .82rem; color: rgba(255,255,255,.75);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.btn-icon {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.7); padding: 6px; border-radius: var(--radius-sm);
  display: flex; align-items: center; transition: color .15s, background .15s;
}
.btn-icon:hover { color: #fff; background: rgba(255,255,255,.15); }

/* ─── メインレイアウト ─── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ─── サイドバー（白地＋ネイビーアクセント） ─── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
  transition: width .22s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { width: 48px; }
#sidebar.collapsed .nav-label,
#sidebar.collapsed #date-tree { display: none; }

#sidebar-nav {
  display: flex; flex-direction: row;
  padding: 10px 8px; gap: 6px;
  border-bottom: 2px solid var(--border);
  background: var(--bg-surface);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  padding: 10px 6px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text-dim);
  font-size: .78rem; font-weight: 700;
  border: 2px solid transparent; background: var(--bg-hover);
  flex: 1; text-align: center;
  transition: color .15s, background .15s, border-color .15s; white-space: nowrap;
  line-height: 1.3;
}
.nav-item svg { display: none; }
.nav-item:hover { color: var(--navy); background: #dde8f5; border-color: var(--navy); }
.nav-item.active {
  color: #fff;
  background: var(--navy);
  border-color: var(--navy);
}

#date-tree { flex: 1; overflow-y: auto; padding: 8px; }
#date-tree::-webkit-scrollbar { width: 4px; }
#date-tree::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

.date-group { margin-bottom: 2px; }
.date-header {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 8px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text-dim); font-size: .8rem; font-weight: 700;
  transition: color .15s, background .15s; user-select: none;
  letter-spacing: .02em;
}
.date-header:hover { color: var(--navy); background: var(--bg-hover); }
.date-header.open { color: var(--navy); }
.date-count {
  margin-left: auto; background: var(--lightblue);
  color: var(--blue); font-size: .68rem; padding: 1px 7px;
  border-radius: 20px; font-weight: 700;
}
.date-arrow { transition: transform .2s; flex-shrink: 0; }
.date-header.open .date-arrow { transform: rotate(90deg); }
.video-list { display: none; padding-left: 8px; }
.date-header.open + .video-list { display: block; }

.video-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text-muted); font-size: .78rem;
  transition: color .15s, background .15s;
}
.video-item:hover { color: var(--navy); background: var(--bg-hover); }
.video-item.active {
  color: var(--blue); background: var(--lightblue);
  font-weight: 600;
}
.video-item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* ─── コンテンツ ─── */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* ─── ウェルカム ─── */
#panel-welcome { flex-direction: column; justify-content: center; align-items: center; gap: 14px; }
.welcome-icon { color: var(--navy); opacity: .15; }
.welcome-text { color: var(--text-muted); font-size: .9rem; }

/* ─── プレイヤーパネル ─── */
#panel-player { flex-direction: row; }

#player-left { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#video-info {
  padding: 10px 18px 8px;
  border-bottom: 2px solid var(--navy);
  background: var(--bg-surface); flex-shrink: 0;
}
#video-title-text { font-size: .95rem; font-weight: 700; color: var(--navy); }
#video-channel { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }

#video-wrap { background: #000; flex-shrink: 0; }
#video-wrap video { width: 100%; max-height: 46vh; display: block; outline: none; }

/* 字幕現在行 */
#subtitle-current {
  min-height: 56px; background: var(--lightblue);
  border-bottom: 1px solid var(--border);
  border-left: 4px solid var(--blue);
  padding: 10px 16px; flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}
#subtitle-current-inner { flex: 1; }
#subtitle-en { font-size: .97rem; line-height: 1.45; color: var(--navy); font-weight: 700; }
#subtitle-ja { font-size: .82rem; color: var(--blue); margin-top: 3px; }
#btn-explain-current {
  background: var(--navy); border: none;
  color: #fff; padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: .75rem; cursor: pointer; white-space: nowrap; font-weight: 600;
  transition: background .15s;
}
#btn-explain-current:hover { background: var(--blue); }
#btn-explain-current:disabled { opacity: .35; cursor: default; }

/* 字幕スクロールリスト */
#subtitle-scroll { flex: 1; overflow-y: auto; padding: 4px 8px; background: var(--bg-base); }
#subtitle-scroll::-webkit-scrollbar { width: 4px; }
#subtitle-scroll::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

.sub-line {
  display: grid;
  grid-template-columns: 40px 1fr 1fr 28px 22px;
  align-items: start; gap: 6px;
  padding: 5px 8px; border-radius: var(--radius-sm);
  cursor: pointer; border-left: 3px solid transparent;
  transition: background .1s;
}
.sub-line:hover { background: var(--bg-hover); }
.sub-line.current { background: var(--lightblue); border-left-color: var(--navy); }
.sub-time { font-size: .7rem; color: var(--text-muted); flex-shrink: 0; margin-top: 2px; font-family: monospace; }
.sub-body { min-width: 0; }
.sub-text { font-size: .83rem; color: var(--text-dim); line-height: 1.45; }
.sub-line.current .sub-text { color: var(--navy); font-weight: 600; }
.sub-ja {
  font-size: .76rem; color: #5577aa; line-height: 1.45;
  border-left: 2px solid var(--border); padding-left: 6px;
  min-width: 0;
}
.sub-line.current .sub-ja { color: var(--blue); border-left-color: var(--blue); }
.sub-difficulty {
  font-size: .68rem; flex-shrink: 0; margin-top: 2px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.diff-badge {
  padding: 1px 5px; border-radius: 8px; font-weight: 700; white-space: nowrap;
}
.diff-1 { background: #e8f4fc; color: var(--blue); }
.diff-2 { background: #fff3cd; color: #856404; }
.diff-3 { background: #fde8e8; color: var(--red); }
.sub-add-btn {
  opacity: 0; flex-shrink: 0; background: none; border: 1px solid var(--border);
  color: var(--text-muted); width: 20px; height: 20px; border-radius: 50%;
  font-size: .75rem; cursor: pointer; line-height: 1; padding: 0;
  transition: all .15s; display: flex; align-items: center; justify-content: center;
}
.sub-line:hover .sub-add-btn { opacity: 1; }
.sub-add-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

/* 単語クリック / 選択ポップアップ */
#word-popup {
  position: fixed; display: none; z-index: 9999;
  background: var(--navy); color: #fff; border-radius: 6px;
  box-shadow: 0 4px 14px rgba(0,0,0,.35); flex-direction: column; overflow: hidden;
  min-width: 180px;
}
#word-popup .wp-word {
  padding: 7px 14px; font-size: .85rem; font-weight: 700;
  border-bottom: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.08);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
}
#word-popup button {
  background: none; border: none; color: #fff; padding: 8px 14px;
  text-align: left; cursor: pointer; font-size: .82rem; font-family: inherit;
  display: flex; align-items: center; gap: 8px;
}
#word-popup button:hover { background: rgba(255,255,255,.12); }
.sub-text .sw { cursor: pointer; border-radius: 2px; }
.sub-text .sw:hover { background: rgba(0,85,170,.12); }

/* 右パネル */
#player-right {
  width: 330px; flex-shrink: 0;
  border-left: 2px solid var(--navy);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg-base);
}

.tab-bar {
  display: flex; border-bottom: 2px solid var(--navy); flex-shrink: 0;
  background: var(--bg-surface);
}
.tab-btn {
  flex: 1; padding: 9px 4px; text-align: center;
  font-size: .76rem; font-weight: 700; color: var(--text-muted);
  cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); background: #fff; }
.tab-btn:hover:not(.active) { color: var(--navy); background: var(--bg-hover); }

.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

/* フレーズタブ */
#tab-phrases-content { overflow-y: auto; padding: 8px; }
#tab-phrases-content::-webkit-scrollbar { width: 4px; }
#tab-phrases-content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

.phrase-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 6px;
  transition: border-color .15s; border-left: 3px solid transparent;
}
.phrase-card:hover { border-color: var(--blue); background: var(--bg-hover); }
.phrase-card.top { border-left-color: var(--red); }
.phrase-en { font-size: .87rem; font-weight: 700; color: var(--navy); }
.phrase-ja { font-size: .77rem; color: var(--blue); margin-top: 3px; }
.phrase-note { font-size: .72rem; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
.phrase-actions { display: flex; gap: 5px; margin-top: 8px; justify-content: flex-end; }
.phrase-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-muted); padding: 3px 8px;
  border-radius: var(--radius-sm); font-size: .7rem; cursor: pointer; transition: all .15s;
}
.phrase-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--lightblue); }
.phrase-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
.phrase-btn.danger:hover { border-color: var(--red); color: var(--red); }
.phrase-btn.explain-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--lightblue); }

.phrase-time {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: .68rem; color: var(--blue); font-family: monospace;
  background: var(--lightblue); border: 1px solid var(--border);
  padding: 2px 7px; border-radius: 20px; font-weight: 700;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.phrase-time:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

/* 詳細タブ */
#tab-detail-content { overflow-y: auto; padding: 12px; flex: 1; }
#tab-detail-content::-webkit-scrollbar { width: 4px; }
#tab-detail-content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

.detail-empty {
  color: var(--text-muted); font-size: .82rem; text-align: center;
  margin-top: 32px; line-height: 1.7;
}
.detail-query {
  background: var(--lightblue); border-left: 4px solid var(--navy);
  padding: 10px 12px; margin-bottom: 12px;
  font-size: .88rem; color: var(--navy); font-weight: 700; line-height: 1.4;
}
.detail-section { margin-bottom: 12px; }
.detail-label {
  font-size: .67rem; font-weight: 700; color: var(--navy);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;
  border-bottom: 1px solid var(--border); padding-bottom: 3px;
}
.detail-value {
  font-size: .82rem; color: var(--text-dim); line-height: 1.55;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px;
}
.detail-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.detail-tag {
  background: var(--lightblue); color: var(--blue); border: 1px solid var(--blue);
  font-size: .7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600;
}
.detail-level {
  display: inline-block;
  padding: 2px 10px; border-radius: 3px; font-size: .72rem; font-weight: 700;
}
.level-初級 { background: #e6f4ea; color: #1a7a4a; border: 1px solid #1a7a4a; }
.level-中級 { background: #fff3e0; color: #D4820A; border: 1px solid #D4820A; }
.level-上級 { background: #fdecea; color: var(--red); border: 1px solid var(--red); }

.detail-loading {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-muted); font-size: .82rem; padding: 16px 0;
}
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--navy);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── ボキャブラリーパネル ─── */
#panel-vocab { flex-direction: column; }
#vocab-toolbar {
  padding: 12px 20px; border-bottom: 2px solid var(--navy);
  display: flex; gap: 10px; align-items: center; flex-shrink: 0;
  background: var(--bg-surface);
}
#vocab-toolbar h2 { font-size: .9rem; font-weight: 700; color: var(--navy); flex-shrink: 0; }
#vocab-search {
  flex: 1; background: #fff; border: 1px solid var(--border-mid);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 7px 12px; font-size: .83rem; outline: none;
  transition: border-color .15s;
}
#vocab-search:focus { border-color: var(--navy); box-shadow: 0 0 0 2px var(--lightblue); }
#vocab-search::placeholder { color: var(--text-muted); }
#vocab-stats { font-size: .75rem; color: var(--text-muted); flex-shrink: 0; }

#vocab-grid {
  flex: 1; overflow-y: auto; padding: 14px 20px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px; align-content: start;
}
#vocab-grid::-webkit-scrollbar { width: 4px; }
#vocab-grid::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

.vocab-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  transition: border-color .15s, box-shadow .15s; cursor: pointer;
  border-top: 3px solid transparent;
}
.vocab-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,85,170,.1); border-top-color: var(--blue); }
.vocab-card.top { border-top-color: var(--red); }

/* ─── フリップカード（単語帳）─── */
.flip-card {
  perspective: 800px; cursor: pointer; height: 120px;
}
.flip-card-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
}
.flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: var(--radius); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px; padding: 12px;
  border: 1.5px solid var(--border); box-sizing: border-box;
}
.flip-card-front {
  background: #fff; border-top: 3px solid var(--navy);
}
.flip-card-back {
  background: var(--lightblue); border-top: 3px solid var(--blue);
  transform: rotateY(180deg);
}
.flip-word-en { font-size: 1.15rem; font-weight: 800; color: var(--navy); text-align: center; }
.flip-word-ja { font-size: .92rem; font-weight: 600; color: var(--blue); text-align: center; }
.flip-hint { font-size: .65rem; color: var(--text-muted); }
.flip-card.top .flip-card-front { border-top-color: var(--red); }
.flip-actions { display:flex; gap:4px; margin-top:4px; }

/* ─── 単語帳グリッド ─── */
#vocab-grid.wordbook-mode { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
.vocab-source { font-size: .7rem; color: var(--text-muted); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-badge {
  display: inline-block; background: var(--red); color: #fff;
  font-size: .62rem; padding: 1px 6px; border-radius: 3px;
  margin-left: 5px; vertical-align: middle; font-weight: 700;
}

/* ─── タグフィルターバー ─── */
#tag-filter-bar { display:flex; gap:6px; padding:8px 20px 0; flex-wrap:wrap; flex-shrink:0; background:var(--bg-surface); border-bottom:1px solid var(--border); }
.tag-chip { padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600; cursor:pointer; border:1px solid var(--border); color:var(--text-dim); background:#fff; transition:all .15s; }
.tag-chip.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.tag-chip:hover:not(.active) { border-color:var(--navy); color:var(--navy); }

/* ─── グループビュー ─── */
.vocab-group-header { font-size:.78rem; font-weight:700; color:var(--navy); padding:10px 0 4px; border-bottom:2px solid var(--navy); margin-bottom:8px; grid-column:1/-1; }
.vocab-group-section { grid-column:1/-1; display:contents; }

/* ─── コメントカード ─── */
.comment-card {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 12px; margin-bottom:6px; border-left:3px solid var(--lightblue);
  position:relative;
}
.comment-author { font-size:.68rem; color:var(--text-muted); margin-bottom:4px; }
.comment-text { font-size:.82rem; color:var(--text-dim); line-height:1.5; }
.comment-likes { font-size:.68rem; color:var(--text-muted); margin-top:4px; }

/* ─── 学習モード ─── */
#study-panel {
  display: flex; flex-direction: column; height: 100%;
  overflow-y: auto; padding: 10px; gap: 8px;
}
#study-panel::-webkit-scrollbar { width: 4px; }
#study-panel::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

#study-screenshot-wrap {
  background: #111; border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; min-height: 70px;
  display: flex; align-items: center; justify-content: center;
}
#study-canvas { width: 100%; height: auto; display: none; }
#study-no-screenshot { color: #888; font-size: .75rem; padding: 12px; }

#study-sentence-wrap {
  background: var(--lightblue); border-left: 4px solid var(--navy);
  padding: 12px; flex-shrink: 0;
}
#study-progress {
  font-size: .68rem; color: var(--text-muted); margin-bottom: 5px;
  text-align: right; font-weight: 600;
}
#study-en { font-size: .97rem; font-weight: 700; color: var(--navy); line-height: 1.5; }
#study-ja { font-size: .82rem; color: var(--blue); margin-top: 5px; line-height: 1.4; }

#study-nav { display: flex; gap: 6px; flex-shrink: 0; }
.study-nav-btn {
  background: #fff; border: 1px solid var(--border-mid);
  color: var(--text-dim); padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: .8rem; cursor: pointer; transition: all .15s; font-weight: 600;
}
.study-nav-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--lightblue); }
.study-explain-btn {
  flex: 1; background: var(--navy); border: none;
  color: #fff; padding: 8px; border-radius: var(--radius-sm);
  font-size: .8rem; cursor: pointer; font-weight: 700; transition: background .15s;
}
.study-explain-btn:hover { background: var(--blue); }
.study-explain-btn:disabled { opacity: .35; cursor: default; }

#study-detail-area { flex: 1; min-height: 0; }
#study-detail-area .detail-section { margin-bottom: 10px; }

/* ─── モーダル ─── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,20,50,.5); z-index: 100;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #fff; border: 1px solid var(--border);
  border-top: 4px solid var(--navy);
  border-radius: var(--radius); padding: 24px;
  width: min(480px, 90vw); max-height: 80vh;
  overflow-y: auto; position: relative;
  box-shadow: 0 8px 32px rgba(0,20,50,.2);
}
#modal::-webkit-scrollbar { width: 4px; }
#modal::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
.modal-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 4px; border-radius: 4px;
}
.modal-close:hover { color: var(--red); background: #fdecea; }

.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 32px; color: var(--text-muted); font-size: .83rem; gap: 8px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

/* ─── ヘッダー検索 ─── */
#header-search-wrap {
  position: relative; flex: 1; max-width: 300px;
  transition: max-width .2s;
}
#header-search {
  width: 100%; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.22); border-radius: 20px;
  color: #fff; padding: 6px 12px 6px 30px;
  font-size: .81rem; outline: none; font-family: inherit;
  transition: background .15s, border-color .15s;
}
#header-search::placeholder { color: rgba(255,255,255,.42); }
#header-search:focus { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
#btn-open-dl {
  background: #e8f000; border: none; color: #1a1a1a;
  padding: 8px 18px; border-radius: var(--radius-sm);
  font-size: .85rem; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap; font-family: inherit; transition: background .15s;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  letter-spacing: .02em;
}
#btn-open-dl:hover { background: #d4db00; }

/* ─── クイックフィルター ─── */
#sidebar-quick {
  display: flex; gap: 4px; padding: 8px 8px 7px;
  border-bottom: 1px solid var(--border);
  background: #fff; flex-shrink: 0;
}
.quick-btn {
  flex: 1; background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 4px;
  font-size: .72rem; font-weight: 600; cursor: pointer;
  color: var(--text-dim); font-family: inherit;
  transition: all .15s; white-space: nowrap;
}
.quick-btn:hover { border-color: var(--navy); color: var(--navy); }
.quick-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }

/* ─── ナビバッジ ─── */
.nav-badge {
  background: var(--lightblue);
  color: var(--blue); font-size: .68rem;
  padding: 1px 7px; border-radius: 20px; font-weight: 800;
  min-width: 20px; text-align: center; margin-top: 2px;
}
.nav-item.active .nav-badge { background: rgba(255,255,255,.3); color: #fff; }

/* ─── サイドバーフッター ─── */
#sidebar-footer {
  padding: 7px 12px; border-top: 1px solid var(--border);
  background: var(--bg-surface); flex-shrink: 0;
}
#footer-stats { font-size: .68rem; color: var(--text-muted); }
#sidebar.collapsed #sidebar-footer,
#sidebar.collapsed #sidebar-quick { display: none; }

/* ─── ウェルカムダッシュボード ─── */
#panel-welcome { justify-content: flex-start; align-items: stretch; overflow-y: auto; }
#welcome-inner {
  padding: 32px 36px; max-width: 680px; margin: 0 auto; width: 100%;
}
#welcome-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 28px;
}
.stat-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 16px;
  text-align: center; border-top: 3px solid var(--navy);
  transition: box-shadow .15s;
}
.stat-card:hover { box-shadow: 0 2px 10px rgba(0,51,102,.1); }
.stat-num {
  font-size: 2rem; font-weight: 700; color: var(--navy);
  line-height: 1.1; margin-bottom: 4px;
}
.stat-label {
  font-size: .7rem; color: var(--text-muted);
  font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
}
.welcome-section-title {
  font-size: .82rem; font-weight: 700; color: var(--navy);
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 2px solid var(--navy);
}
#welcome-recent { margin-bottom: 24px; }
#recent-list { display: flex; flex-direction: column; gap: 6px; }
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: #fff;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; transition: border-color .15s, background .15s;
}
.recent-item:hover { border-color: var(--blue); background: var(--bg-hover); }
.recent-item-title {
  font-size: .85rem; font-weight: 600; color: var(--navy);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.recent-item-date { font-size: .72rem; color: var(--text-muted); flex-shrink: 0; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <button class="btn-icon" id="btn-toggle-sidebar" title="メニュー (M)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    YouTube学習
  </div>
  <div id="header-search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);pointer-events:none">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="header-search" type="text" placeholder="動画・フレーズを検索… (Ctrl+K)"
      oninput="onHeaderSearch()" onfocus="onSearchFocus()" onblur="onSearchBlur()">
  </div>
  <span id="header-title"></span>
  <button id="btn-open-dl" onclick="openDlModal()" title="URLからダウンロード (D)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    📥 DL・登録
  </button>
</div>

<!-- メイン -->
<div id="main">

  <!-- サイドバー -->
  <nav id="sidebar">

    <!-- クイックアクション -->
    <div id="sidebar-quick">
      <button class="quick-btn active" id="qbtn-all"   onclick="setFilter('all')"  >すべて</button>
      <button class="quick-btn"        id="qbtn-today" onclick="setFilter('today')">今日</button>
      <button class="quick-btn"        id="qbtn-week"  onclick="setFilter('week')" >今週</button>
    </div>

    <!-- ナビ -->
    <div id="sidebar-nav">
      <button class="nav-item active" data-panel="dates" onclick="showNav('dates')">
        <span style="font-size:1.3rem">📹</span>
        <span>動画<br>ライブラリ</span>
        <span class="nav-badge" id="badge-videos"></span>
      </button>
      <button class="nav-item" data-panel="vocab" onclick="showNav('vocab')">
        <span style="font-size:1.3rem">📚</span>
        <span>ボキャブ<br>ラリー</span>
        <span class="nav-badge" id="badge-phrases"></span>
      </button>
    </div>

    <!-- 日付ツリー -->
    <div id="date-tree">
      <div class="loading"><div class="spinner"></div>読み込み中…</div>
    </div>

    <!-- 下部ステータス -->
    <div id="sidebar-footer">
      <span id="footer-stats">—</span>
    </div>
  </nav>

  <!-- コンテンツ -->
  <div id="content">

    <!-- ウェルカム（ダッシュボード） -->
    <div class="panel active" id="panel-welcome">
      <div id="welcome-inner">
        <div id="welcome-stats">
          <div class="stat-card">
            <div class="stat-num" id="stat-videos">—</div>
            <div class="stat-label">動画</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-phrases">—</div>
            <div class="stat-label">フレーズ</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-top">—</div>
            <div class="stat-label">重要フレーズ</div>
          </div>
        </div>
        <div id="welcome-recent">
          <div class="welcome-section-title">🕐 最近の動画</div>
          <div id="recent-list"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <button onclick="openDlModal()" style="
            margin-top:20px; background:var(--navy); border:none; color:#fff;
            padding:12px 28px; border-radius:4px; font-size:.88rem; font-weight:700;
            cursor:pointer; font-family:inherit; transition:background .15s;
            display:inline-flex; align-items:center; gap:8px;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          新しい動画をダウンロード
        </button>
      </div>
    </div>

    <!-- 動画プレイヤー -->
    <div class="panel" id="panel-player">
      <!-- 左：動画 + 字幕 -->
      <div id="player-left">
        <div id="video-info">
          <div id="video-title-text">—</div>
          <div id="video-channel"></div>
          <div id="video-actions" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"></div>
        </div>
        <div id="video-wrap">
          <video id="video-player" controls preload="metadata"></video>
        </div>
        <!-- 現在字幕 -->
        <div id="subtitle-current">
          <div id="subtitle-current-inner">
            <div id="subtitle-en">—</div>
            <div id="subtitle-ja"></div>
          </div>
          <button id="btn-explain-current" onclick="explainCurrent()" disabled>🔍 解説</button>
        </div>
        <!-- 字幕リスト -->
        <div style="display:grid;grid-template-columns:40px 1fr 1fr auto;gap:6px;padding:4px 8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg-base)">
          <span></span>
          <span style="font-size:.68rem;color:var(--text-muted);font-weight:700">English</span>
          <span style="font-size:.68rem;color:var(--text-muted);font-weight:700;border-left:2px solid var(--border);padding-left:6px">日本語</span>
          <span></span>
        </div>
        <div id="subtitle-scroll"></div>
      </div>

      <!-- 右：タブパネル -->
      <div id="player-right">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('phrases')">フレーズ</button>
          <button class="tab-btn" onclick="switchTab('detail')">🔍 解説</button>
          <button class="tab-btn" onclick="switchTab('study')">📷 学習</button>
          <button class="tab-btn" onclick="switchTab('comments')">💬 コメント</button>
        </div>

        <!-- フレーズタブ -->
        <div class="tab-content active" id="tab-phrases">
          <div id="tab-phrases-content">
            <div class="loading">フレーズなし</div>
          </div>
        </div>

        <!-- 詳細タブ -->
        <div class="tab-content" id="tab-detail">
          <div id="tab-detail-content">
            <p class="detail-empty">字幕の「🔍 解説」ボタンか<br>フレーズの「解説」ボタンをクリックしてください</p>
          </div>
        </div>

        <!-- 学習モードタブ -->
        <div class="tab-content" id="tab-study">
          <div id="study-panel">
            <div id="study-screenshot-wrap">
              <canvas id="study-canvas"></canvas>
              <div id="study-no-screenshot">動画から自動キャプチャ</div>
            </div>
            <div id="study-sentence-wrap">
              <div id="study-progress"></div>
              <div id="study-en"></div>
              <div id="study-ja"></div>
            </div>
            <div id="study-nav">
              <button class="study-nav-btn" onclick="studyPrev()">◀ 前</button>
              <button id="btn-study-explain" class="study-explain-btn" onclick="studyExplain()">🔍 英検1級解説</button>
              <button class="study-nav-btn" onclick="studyNext()">次 ▶</button>
            </div>
            <div id="study-detail-area"></div>
          </div>
        </div>

        <!-- コメントタブ -->
        <div class="tab-content" id="tab-comments">
          <div id="tab-comments-content" style="overflow-y:auto;flex:1;padding:8px">
            <div class="loading">動画を選択してください</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ボキャブラリー -->
    <div class="panel" id="panel-vocab">
      <div id="vocab-toolbar">
        <h2>📚 ボキャブラリー</h2>
        <input id="vocab-search" type="text" placeholder="フレーズを検索…" oninput="onVocabSearch()">
        <span id="vocab-stats"></span>

            background:var(--navy);border:none;color:#fff;
            padding:6px 12px;border-radius:4px;font-size:.76rem;font-weight:700;
            cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
          ＋ 追加
        </button>
        <button onclick="prefetchAllExplanations()" style="
            background:var(--blue);border:none;color:#fff;
            padding:6px 12px;border-radius:4px;font-size:.76rem;font-weight:700;
            cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
          🔄 解説一括取得
        </button>
        <button onclick="fetchAllComments()" style="
            background:#5a6f8a;border:none;color:#fff;
            padding:6px 12px;border-radius:4px;font-size:.76rem;font-weight:700;
            cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
          💬 コメント取得
        </button>
        <button onclick="toggleVocabGroupView()" id="btn-group-view" style="
            background:#fff;border:1px solid var(--border);color:var(--text-dim);

        <button onclick="clearAllVocab()" style="
            background:#fff;border:1px solid var(--danger);color:var(--danger);
            padding:6px 12px;border-radius:4px;font-size:.76rem;font-weight:700;
            cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
          🗑 全クリア
        </button>
        <button onclick="showNetworkView()" style="
            background:#fff;border:1px solid var(--border);color:var(--text-dim);
            padding:6px 12px;border-radius:4px;font-size:.76rem;font-weight:700;
            cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
          🕸️ 関連
        </button>

      <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center">

            border:1px solid var(--blue);background:var(--blue);color:#fff;
            padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;font-family:inherit">
          すべて
        </button>
        <button id="btn-vocab-top" onclick="setVocabFilter('top')" style="
            border:1px solid var(--border);background:#fff;color:var(--text-dim);
            padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;font-family:inherit">
          ★ お気に入り
        </button>
        <button id="btn-vocab-current" onclick="setVocabFilter('current')" style="
            border:1px solid var(--border);background:#fff;color:var(--text-dim);
            padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;font-family:inherit">
          📹 この動画
        </button>
        <button id="btn-vocab-words" onclick="setVocabFilter('words')" style="
            border:1px solid var(--border);background:#fff;color:var(--text-dim);
            padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;font-family:inherit">
          📖 単語帳
        </button>
        <button id="btn-vocab-phrases" onclick="setVocabFilter('phrases')" style="

      <div id="tag-filter-bar">

</div><!-- /main -->

<!-- ダウンロードモーダル -->
<div id="dl-overlay" onclick="closeDlModal(event)" style="
    display:none; position:fixed; inset:0;

    <button onclick="closeDlModal()" style="

          transition:border-color .15s;"></textarea>
    </div>

    <!-- オプション行 -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">

        <select id="dl-mode" style="
            width:100%; border:1px solid #a0b8d0; border-radius:4px;
            padding:7px 10px; font-size:.83rem; color:#1a2a3a; outline:none; background:#fff;">
          <option value="both">動画＋字幕＋LLM解析</option>
          <option value="sub">字幕＋LLM解析のみ</option>
          <option value="video">動画のみ</option>
        </select>
      </div>
      <div>

async function loadDates() {
  const tree = document.getElementById('date-tree');
  tree.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中…</div>';
  let dates = await apiFetch('/api/dates');
  if (!dates || !dates.length) {
    tree.innerHTML = '<div class="loading" style="flex-direction:column;text-align:center;gap:6px">'
      + '<span style="color:var(--text-dim)">動画なし</span>'
      + '<span style="font-size:.72rem;color:var(--text-muted)">URLからダウンロードしてください</span></div>';
    return;
  }

  // フィルター適用
  if (_currentFilter === 'today') {
    const todayStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    dates = dates.filter(d => d.date === todayStr);
  } else if (_currentFilter === 'week') {
    const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0,10).replace(/-/g,'');
    dates = dates.filter(d => d.date >= weekAgo);
  }

  if (!dates.length) {
    tree.innerHTML = '<div class="loading" style="flex-direction:column;text-align:center;gap:6px">'
      + '<span style="color:var(--text-dim)">該当期間の動画なし</span></div>';
    return;
  }

  tree.innerHTML = '';
  for (const d of dates) {
    const g = document.createElement('div');
    g.className = 'date-group';
    g.innerHTML = `
      <div class="date-header" data-date="${d.date}" onclick="toggleDate(this,'${d.date}')">
        <svg class="date-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>

        📅 ${d.display}
        <span class="date-count">${d.count}</span>
      </div>
      <div class="video-list" id="vlist-${d.date}">
        <div class="loading"><div class="spinner"></div></div>
      </div>`;
    tree.appendChild(g);
  }

  // 最新（先頭）日付を自動展開
  const firstHeader = tree.querySelector('.date-header');
  if (firstHeader) toggleDate(firstHeader, dates[0].date);
}

  const videos = await apiFetch(`/api/dates/${date}/videos`);
  list.innerHTML = '';
  if (!videos.length) {
    list.innerHTML = '<div style="padding:5px 8px;font-size:.76rem;color:var(--text-muted)">動画なし</div>';
    return;
  }
  for (const v of videos) {
    const el = document.createElement('div');
    el.className = 'video-item';
    if (v.video_id) el.dataset.videoId = v.video_id;
    el.innerHTML = `

    el.onclick = () => openVideo(v, el);
    list.appendChild(el);
  }
}

// ─────────────────────────────────────────────
// 字幕リスト描画
// ─────────────────────────────────────────────
// 文法難易度スコアリング（ローカル、API不要）
function grammarDifficulty(text) {
  let score = 0;
  const t = text.toLowerCase();
  const words = t.split(/\s+/).filter(Boolean);
  const wc = words.length;

  // 長さ
  if (wc > 15) score += 1;
  if (wc > 22) score += 1;

  // 文法構造
  const patterns = [
    [/\b(had\s+\w+ed|had\s+been)\b/, 1, '過去完了'],
    [/\b(were\s+to|should\s+have|would\s+have|could\s+have|might\s+have)\b/, 1, '仮定法'],
    [/\bnot\s+only.+but\s+(also)?\b/, 1, '相関接続詞'],
    [/\bit\s+(is|was|were)\s+.+\s+that\b/, 1, '強調構文'],
    [/\b(having\s+\w+ed|being\s+\w+ed)\b/, 1, '分詞構文'],
    [/\b(so\s+.+\s+that|such\s+.+\s+that)\b/, 1, 'so...that'],
    [/\b(no\s+sooner|hardly|scarcely).+(than|when|before)\b/, 1, '倒置'],
    [/\b(not\s+until|never\s+before|seldom|rarely)\b/, 1, '部分否定/倒置'],
    [/\b(whoever|whatever|wherever|whenever|however)\b/, 1, '複合関係詞'],
    [/\b(despite|notwithstanding|regardless\s+of)\b/, 1, '前置詞句'],
    [/\b(lest|albeit|insofar|inasmuch)\b/, 2, '文語接続詞'],
    [/,\s*(which|who|whose|where)\b/, 1, '関係詞節'],
    [/\b\w+ing\b.{0,20}\b(is|are|was|were)\b/, 1, '動名詞主語'],
  ];

  const found = [];
  for (const [re, pts, label] of patterns) {
    if (re.test(t)) { score += pts; found.push(label); }
  }

  // 難易度レベル
  let level = 0;
  if (score >= 2) level = 1;
  if (score >= 4) level = 2;
  if (score >= 6) level = 3;
  return { level, score, tags: found };
}

// YouTubeスライディングウィンドウ字幕の重複除去
// YouTubeスライディングウィンドウ字幕の重複除去
// パターン: "A" → "A B" → "A B C" → "B C" → "B C D" ...
function dedupeSliding(subs) {
  if (!subs.length) return subs;
  const result = [];
  for (let i = 0; i < subs.length; i++) {
    const cur = subs[i];
    if (!cur.text.trim()) continue;
    const next = subs[i + 1];
    const T = 2.5; // 重複判定の時間しきい値（秒）

    // ① 次が現在のテキストを含む（現在は前半、次が拡張版）→ 現在をスキップ
    if (next && (next.start - cur.start) < T && next.text.includes(cur.text)) continue;

    if (result.length > 0) {
      const prev = result[result.length - 1];
      const dt = cur.start - prev.start;
      if (cur.text === prev.text) continue; // 完全重複
      if (dt < T) {
        // ② 現在が前を含む（前の拡張版）→ 前を置換
        if (cur.text.includes(prev.text)) {
          result[result.length - 1] = cur;
          continue;
        }
        // ③ 前が現在を含む（現在は次フレーズの開始、前の末尾と重複）→ 現在をスキップ
        if (prev.text.includes(cur.text)) continue;
      }
    }
    result.push(cur);
  }
  return result;
}

function renderSubtitleList() {
  const scroll = document.getElementById('subtitle-scroll');
  // EN字幕がなければJA字幕をフォールバック表示
  const useJaOnly = !state.subtitlesEN.length && state.subtitlesJA.length > 0;
  const rawSubs = useJaOnly ? state.subtitlesJA : state.subtitlesEN;
  // スライディングウィンドウ重複除去
  const subs = dedupeSliding(rawSubs);
  if (!subs.length) {
    scroll.innerHTML = '<div class="loading">字幕なし（🇬🇧 英語字幕ボタンで取得できます）</div>';
    return;
  }
  scroll.innerHTML = '';
  subs.forEach((s, i) => {
    // JA-onlyモードでは右列不要（メイン列がJA）
    const ja = useJaOnly ? null
             : (state.subtitlesJA.find(j => s.start >= j.start && s.start < j.end)
             || state.subtitlesJA.find(j => Math.abs(j.start - s.start) < 2.0));
    const diff = useJaOnly ? { level: 0 } : grammarDifficulty(s.text);
    const div = document.createElement('div');
    div.className = 'sub-line';
    div.dataset.idx = i;

    // 時刻
    const timeEl = document.createElement('span');
    timeEl.className = 'sub-time';
    timeEl.textContent = fmtTime(s.start);

    // メイン列（EN or JA-only）
    const textEl = document.createElement('div');
    textEl.className = 'sub-body';
    const textSpan = document.createElement('span');
    textSpan.className = 'sub-text';
    // 単語を<span class="sw">で分割してクリック可能に
    textSpan.innerHTML = s.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .split(/(\s+)/).map(t => t.trim() ? `<span class="sw">${t}</span>` : t).join('');
    // 単語クリック
    textSpan.addEventListener('click', e => {
      const sw = e.target.closest('.sw');
      if (!sw) return;
      e.stopPropagation();
      showWordPopup(sw.textContent.replace(/[^\w''-]/g, '').trim() || sw.textContent.trim(), e.clientX, e.clientY, s.text);
    });
    // フレーズ選択（mouseup）
    textSpan.addEventListener('mouseup', e => {
      setTimeout(() => {
        const sel = window.getSelection();
        const selected = sel ? sel.toString().trim() : '';
        if (selected.length > 1) {
          e.stopPropagation();
          showWordPopup(selected, e.clientX, e.clientY, s.text);
        }
      }, 10);
    });
    textEl.appendChild(textSpan);

    // 右列（EN+JAモード時のみJA表示）
    const jaEl = document.createElement('div');
    jaEl.className = 'sub-ja';
    jaEl.textContent = useJaOnly ? '' : (ja ? ja.text : '');

    // 難易度バッジ
    const diffEl = document.createElement('div');
    diffEl.className = 'sub-difficulty';
    if (diff.level > 0) {
      const labels = ['', '💡', '💡💡', '💡💡💡'];
      const badge = document.createElement('span');
      badge.className = `diff-badge diff-${diff.level}`;
      badge.textContent = labels[diff.level];
      badge.title = diff.tags.join(', ');
      diffEl.appendChild(badge);
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'sub-add-btn';
    addBtn.title = 'フレーズ登録';
    addBtn.textContent = '+';
    addBtn.onclick = (e) => { e.stopPropagation(); openAddPhraseModal(null, ''); };

    div.appendChild(timeEl);
    div.appendChild(textEl);
    div.appendChild(jaEl);
    div.appendChild(diffEl);
    div.appendChild(addBtn);

    div.onclick = () => {
      if (state._lastClickedSubIdx === i && Math.abs(video.currentTime - s.start) < 1.0) {
        // 同じ行を再度クリック → 再生
        video.play();
      } else {
        // 初回クリック → シークして一時停止
        video.currentTime = s.start;
        video.pause();
        state._lastClickedSubIdx = i;
      }
    };
    scroll.appendChild(div);
  });
}

// ─────────────────────────────────────────────
// 字幕同期
// ─────────────────────────────────────────────
function syncSubtitles() {
  const t = video.currentTime;
  const useJaOnly = !state.subtitlesEN.length && state.subtitlesJA.length > 0;
  const subs = dedupeSliding(useJaOnly ? state.subtitlesJA : state.subtitlesEN);
  if (!subs.length) return;

  // YouTube自動字幕はスライディングウィンドウで重複するため末尾から検索
  let idx = -1;
  for (let i = subs.length - 1; i >= 0; i--) {
    if (t >= subs[i].start) { idx = i; break; }
  }
  // 終了時刻を大幅に過ぎていたら非表示（字幕間の空白）
  if (idx >= 0 && t > subs[idx].end + 1.5) idx = -1;
  if (idx === state.currentSubIdx) return;
  state.currentSubIdx = idx;

  const enEl = document.getElementById('subtitle-en');
  const jaEl = document.getElementById('subtitle-ja');
  const btn  = document.getElementById('btn-explain-current');

  if (idx >= 0) {
    const s = subs[idx];
    enEl.textContent = s.text;
    state.currentSubText = s.text;
    const ja = state.subtitlesJA.find(j => s.start >= j.start && s.start < j.end)
             || state.subtitlesJA.find(j => Math.abs(j.start - s.start) < 2.0);
    jaEl.textContent = ja ? ja.text : '';
    btn.disabled = false;
  } else {
    enEl.textContent = '—';
    jaEl.textContent = '';
    state.currentSubText = '';
    btn.disabled = true;
  }

  // リストハイライト
  const scroll = document.getElementById('subtitle-scroll');
  scroll.querySelectorAll('.sub-line').forEach(el => el.classList.remove('current'));
  if (idx >= 0) {
    const cur = scroll.querySelector(`[data-idx="${idx}"]`);
    if (cur) {
      cur.classList.add('current');
      cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

async function explainText(text, context) {
  switchTab('detail');
  const container = document.getElementById('tab-detail-content');
  container.innerHTML = `<div class="detail-query">${esc(text)}</div><div class="detail-loading"><div class="spinner"></div>OpenRouterで解析中…</div>`;

  const data = await apiPost('/api/explain', { text, context: context || '' });
  renderDetail(container, text, data);
}

function renderDetail(container, query, data) {
  if (data.error) {
    container.innerHTML = `<div class="detail-query">${esc(query)}</div>`
      + `<div style="color:var(--danger);font-size:.82rem;padding:12px">${esc(data.error)}</div>`;
    return;
  }
  let html = `<div class="detail-query">${esc(query)}</div>`;

  if (data.level) {
    html += `<div class="detail-section"><div class="detail-label">レベル</div>
      <span class="detail-level level-${data.level}">${esc(data.level)}</span></div>`;
  }
  if (data.meaning) {
    html += `<div class="detail-section"><div class="detail-label">意味・説明</div>
      <div class="detail-value">${esc(data.meaning)}</div></div>`;
  }
  if (data.usage) {
    html += `<div class="detail-section"><div class="detail-label">使い方・ニュアンス</div>
      <div class="detail-value">${esc(data.usage)}</div></div>`;
  }
  if (data.example) {
    html += `<div class="detail-section"><div class="detail-label">例文</div>
      <div class="detail-value"><strong>${esc(data.example)}</strong>${data.example_ja ? '<br><span style="color:var(--text-dim)">' + esc(data.example_ja) + '</span>' : ''}</div></div>`;
  }
  if (data.related && data.related.length) {
    html += `<div class="detail-section"><div class="detail-label">関連語・類語</div>
      <div class="detail-tags" id="related-tags-main"></div></div>`;
  }
  container.innerHTML = html;
  if (data.related && data.related.length) {
    const tagsEl = container.querySelector('#related-tags-main');
    data.related.forEach(r => {
      const sp = document.createElement('span');
      sp.className = 'detail-tag';
      sp.textContent = r;
      sp.style.cursor = 'pointer';
      sp.onclick = () => explainText(r, '');
      tagsEl.appendChild(sp);
    });
  }
}

function explainCurrent() {
  if (!state.currentSubText) return;
  explainText(state.currentSubText, '');
}

// フレーズのテキストからSRT字幕を検索して出現時間を返す
function findPhraseTime(phraseEn) {
  const subs = state.subtitlesEN;
  if (!subs.length) return null;
  const clean = phraseEn.replace(/\*\*/g,'').replace(/\*/g,'').replace(/`/g,'').toLowerCase().trim();
  if (!clean || clean.length < 3) return null;
  // フル一致
  for (const s of subs) {
    if (s.text.toLowerCase().includes(clean)) return s.start;
  }
  // 先頭4単語で検索
  const words = clean.split(/\s+/).filter(w => w.length > 2).slice(0, 4).join(' ');
  if (words.length > 5) {
    for (const s of subs) {
      if (s.text.toLowerCase().includes(words)) return s.start;
    }
  }
  return null;
}

// phrase_en の語数で単語/フレーズを判定（1〜2語=単語、3語以上=フレーズ）
function isWord(phraseEn) {
  const clean = phraseEn.replace(/[*_`]/g, '').trim();
  return clean.split(/\s+/).length <= 2;
}

async function loadVocab() {
  const grid = document.getElementById('vocab-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中…</div>';
  let url = `/api/phrases?page=1&per_page=200&q=${encodeURIComponent(state.vocabQuery)}`;
  if (state.vocabTag) url += `&tag=${encodeURIComponent(state.vocabTag)}`;
  if (state.vocabFilter === 'top') url += '&top_only=1';
  if (state.vocabFilter === 'current' && state.currentVideo?.video_id) {
    url = `/api/video/${state.currentVideo.video_id}/phrases`;
  }
  const raw = await apiFetch(url);
  const data = Array.isArray(raw) ? { phrases: raw, total: raw.length } : raw;
  grid.innerHTML = '';
  if (!data.phrases || !data.phrases.length) {
    grid.innerHTML = '<div class="loading">フレーズなし。</div>';
    return;
  }

  // 単語帳・フレーズ帳フィルタリング（クライアントサイド）
  let phrases = data.phrases;
  if (state.vocabFilter === 'words')   phrases = phrases.filter(p => isWord(p.phrase_en));
  if (state.vocabFilter === 'phrases') phrases = phrases.filter(p => !isWord(p.phrase_en));

  const label = state.vocabFilter === 'words'   ? `📖 単語帳 ${phrases.length}語`
              : state.vocabFilter === 'phrases'  ? `📝 フレーズ帳 ${phrases.length}件`
              : `${data.total ?? phrases.length} フレーズ`;
  document.getElementById('vocab-stats').textContent = label;

  if (!phrases.length) {
    grid.innerHTML = '<div class="loading">該当なし</div>';
    return;
  }

  if (state.vocabFilter === 'words') {
    // 単語帳：フリップカード表示
    phrases.forEach(p => grid.appendChild(makeFlipCard(p)));
  } else if (state.vocabGroupView) {
    // タグ別グループ表示
    const groups = {};
    const noTag = [];
    phrases.forEach(p => {
      const tags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);
      if (!tags.length) { noTag.push(p); return; }
      tags.forEach(tag => {
        if (!groups[tag]) groups[tag] = [];
        groups[tag].push(p);
      });
    });
    const allGroups = Object.keys(groups).sort();
    allGroups.forEach(tag => {
      const header = document.createElement('div');
      header.className = 'vocab-group-header';
      header.textContent = `# ${tag} (${groups[tag].length})`;
      grid.appendChild(header);
      groups[tag].forEach(p => grid.appendChild(makeVocabCard(p)));
    });
    if (noTag.length) {
      const header = document.createElement('div');
      header.className = 'vocab-group-header';
      header.textContent = `# タグなし (${noTag.length})`;
      grid.appendChild(header);
      noTag.forEach(p => grid.appendChild(makeVocabCard(p)));
    }
  } else {
    phrases.forEach(p => grid.appendChild(makeVocabCard(p)));
  }
}

function makeFlipCard(p) {
  const expl = p.explanation ? (() => { try { return JSON.parse(p.explanation); } catch { return {}; } })() : {};
  const div = document.createElement('div');
  div.className = 'flip-card' + (p.is_top ? ' top' : '');
  div.innerHTML = `
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <div class="flip-word-en">${esc(p.phrase_en.replace(/[*_]/g,''))}</div>
        ${expl.etymology ? `<div class="flip-hint">🌱 ${esc(expl.etymology.substring(0,40))}…</div>` : ''}
        <div class="flip-hint" style="color:#bbb">タップで訳を表示</div>
      </div>
      <div class="flip-card-back">
        <div class="flip-word-ja">${esc(p.phrase_ja || expl.definition_ja || '')}</div>
        ${expl.mnemonic ? `<div class="flip-hint">🎵 ${esc(expl.mnemonic.substring(0,40))}</div>` : ''}
        <div class="flip-actions">
          <button class="phrase-btn ${p.is_top ? 'active' : ''}" onclick="event.stopPropagation();toggleVocabTopById(${p.id},this)">★</button>
          <button class="phrase-btn" onclick="event.stopPropagation();explainText('${esc(p.phrase_en.replace(/[*_]/g,''))}','')">解説</button>
        </div>
      </div>
    </div>`;
  div.onclick = () => div.classList.toggle('flipped');
  return div;
}

let _netData = null;
let _netAnim = null;
let _netNodes = [];
let _netEdges = [];

async function renderNetwork() {
  const data = await apiFetch('/api/network');
  _netData = data;
  const canvas = document.getElementById('network-canvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width || 600;
  canvas.height = (rect.height || 400) - 50;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');

  const nodes = data.nodes.map(n => ({
    ...n,
    x: W/2 + (Math.random()-0.5)*W*0.6,
    y: H/2 + (Math.random()-0.5)*H*0.6,
    vx: 0, vy: 0,
  }));
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const edges = data.links.filter(l => nodeMap[l.source] && nodeMap[l.target]);

  document.getElementById('network-stats').textContent = `${nodes.length} フレーズ / ${edges.length} 関連`;

  const TAG_COLORS = {
    'イディオム': '#e74c3c', '上級': '#9b59b6', '英検1級': '#2980b9',
    '単語': '#27ae60', '表現': '#f39c12', 'ビジネス': '#1abc9c',
    '食・料理': '#e67e22', '感情': '#e91e63',
  };
  function nodeColor(n) {
    if (n.is_top) return '#f0a000';
    if (n.tags && n.tags[0] && TAG_COLORS[n.tags[0]]) return TAG_COLORS[n.tags[0]];
    return '#7f8c8d';
  }

  let dragging = null, ox = 0, oy = 0;
  canvas.onmousedown = e => {
    const r2 = canvas.getBoundingClientRect();
    const mx = e.clientX - r2.left, my = e.clientY - r2.top;
    dragging = nodes.find(n => Math.hypot(n.x-mx,n.y-my) < 10);
    if (dragging) { ox = mx-dragging.x; oy = my-dragging.y; canvas.style.cursor='grabbing'; }
  };
  canvas.onmousemove = e => {
    if (!dragging) return;
    const r2 = canvas.getBoundingClientRect();
    dragging.x = e.clientX - r2.left - ox;
    dragging.y = e.clientY - r2.top - oy;
    dragging.vx = 0; dragging.vy = 0;
  };
  canvas.onmouseup = () => { dragging = null; canvas.style.cursor='grab'; };

  // tooltip
  canvas.onmousemove = (e => {
    const orig = canvas.onmousemove;
    return ev => {
      if (dragging) { orig && orig(ev); return; }
      const r2 = canvas.getBoundingClientRect();
      const mx = ev.clientX - r2.left, my = ev.clientY - r2.top;
      const hover = nodes.find(n => Math.hypot(n.x-mx,n.y-my) < 12);
      canvas.title = hover ? hover.label : '';
    };
  })();

  if (_netAnim) cancelAnimationFrame(_netAnim);

  function simulate() {
    const K = 0.01, REPEL = 800, DAMP = 0.85;
    nodes.forEach(a => {
      nodes.forEach(b => {
        if (a === b) return;
        const dx = a.x - b.x, dy = a.y - b.y;
        const d2 = dx*dx + dy*dy + 1;
        const f = REPEL / d2;
        a.vx += dx * f; a.vy += dy * f;
      });
      // center gravity
      a.vx += (W/2 - a.x) * 0.002;
      a.vy += (H/2 - a.y) * 0.002;
    });
    edges.forEach(e => {
      const a = nodeMap[e.source], b = nodeMap[e.target];
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx+dy*dy)+0.1;
      const f = (d - 80) * K;
      const fx = dx/d*f, fy = dy/d*f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    });
    nodes.forEach(n => {
      if (n === dragging) return;
      n.vx *= DAMP; n.vy *= DAMP;
      n.x = Math.max(15, Math.min(W-15, n.x + n.vx));
      n.y = Math.max(15, Math.min(H-15, n.y + n.vy));
    });

    ctx.clearRect(0, 0, W, H);
    // edges
    ctx.lineWidth = 1;
    edges.forEach(e => {
      const a = nodeMap[e.source], b = nodeMap[e.target];
      if (!a || !b) return;
      ctx.strokeStyle = e.type === 'related' ? 'rgba(100,150,200,0.4)' : 'rgba(150,150,150,0.3)';
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    });
    // nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.is_top ? 9 : 6, 0, Math.PI*2);
      ctx.fillStyle = nodeColor(n);
      ctx.fill();
      if (n.is_top) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
      ctx.fillStyle = '#333';
      ctx.font = '9px sans-serif';
      ctx.fillText(n.label.substring(0,15), n.x+10, n.y+3);
    });

    _netAnim = requestAnimationFrame(simulate);
  }
  simulate();
}

function playVideoFromModal(vinfo) {
  closeModal();
  // サイドバーで対応する動画アイテムを探してクリック
  if (!vinfo.media_path) return;
  const stem = vinfo.media_path.split('/').pop().replace('.mp4','');
  const items = document.querySelectorAll('.video-item');
  for (const el of items) {
    if (el.querySelector('.video-item-title')?.title?.includes(vinfo.title?.slice(0,10) || stem)) {
      el.click();
      return;
    }
  }
  // 見つからなければ直接ロード
  const v = {
    stem,
    title:    vinfo.title || stem,
    channel:  vinfo.channel || '',
    video_id: vinfo.video_id,
    mp4:      vinfo.media_path,
    en_srt:   vinfo.en_srt || null,
    ja_srt:   vinfo.ja_srt || null,
  };
  // 対応する日付ツリーを開いてから再生
  const date = (vinfo.date || vinfo.media_path || '').split('/')[0];
  if (date && date.match(/^\d{8}$/)) {
    const header = [...document.querySelectorAll('.date-header')]
      .find(h => h.textContent.includes(date.slice(0,4)+'/'+date.slice(4,6)+'/'+date.slice(6,8)));
    if (header && !header.classList.contains('open')) {
      toggleDate(header, date).then(() => {
        setTimeout(() => {
          const items2 = document.querySelectorAll('.video-item');
          for (const el of items2) {
            if (el.querySelector('.video-item-title')?.textContent?.includes(stem.slice(0,15))) {
              el.click(); return;
            }
          }
          openVideo(v, document.createElement('div'));
        }, 400);
      });
      return;
    }
  }
  openVideo(v, document.createElement('div'));
  showNav('dates');
}

async function loadComments(videoId) {
  const el = document.getElementById('tab-comments-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await apiFetch(`/api/video/${videoId}/comments`);
  if (!data || !data.length) {
    el.innerHTML = '<div class="detail-empty">コメントなし<br><small>次回DL時に取得されます</small></div>';
    return;
  }
  el.innerHTML = '';
  data.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment-card';

    const author = document.createElement('div');
    author.className = 'comment-author';
    author.textContent = '👤 ' + c.author;

    const textDiv = document.createElement('div');
    textDiv.className = 'comment-text';
    textDiv.textContent = c.text;
    textDiv.style.cursor = 'text';
    textDiv.style.userSelect = 'text';

    const likes = document.createElement('div');
    likes.className = 'comment-likes';
    likes.textContent = '👍 ' + c.likes;

    // 選択テキストのポップアップメニュー
    const popup = document.createElement('div');
    popup.style.cssText = 'display:none;position:absolute;background:var(--navy);color:#fff;border-radius:4px;padding:4px;gap:4px;z-index:100;flex-direction:row';
    const btnExplainSel = document.createElement('button');
    btnExplainSel.textContent = '🔍 解説';
    btnExplainSel.style.cssText = 'border:none;background:rgba(255,255,255,0.15);color:#fff;padding:3px 8px;border-radius:3px;font-size:.72rem;cursor:pointer;font-family:inherit';
    const btnRegSel = document.createElement('button');
    btnRegSel.textContent = '+ 登録';
    btnRegSel.style.cssText = btnExplainSel.style.cssText;
    popup.appendChild(btnExplainSel);
    popup.appendChild(btnRegSel);
    div.appendChild(popup);

    textDiv.addEventListener('mouseup', () => {
      const sel = window.getSelection();
      const selected = sel ? sel.toString().trim() : '';
      if (selected.length > 1) {
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const pRect = div.getBoundingClientRect();
        popup.style.display = 'flex';
        popup.style.left = (rect.left - pRect.left) + 'px';
        popup.style.top = (rect.top - pRect.top - 36) + 'px';
        btnExplainSel.onclick = (e) => { e.stopPropagation(); popup.style.display='none'; explainText(selected, c.text); };
        btnRegSel.onclick = (e) => { e.stopPropagation(); popup.style.display='none'; openAddPhraseModal(null, selected); };
      } else {
        popup.style.display = 'none';
      }
    });

    const actions = document.createElement('div');
    actions.className = 'phrase-actions';
    actions.style.marginTop = '6px';

    const btnExplain = document.createElement('button');
    btnExplain.className = 'phrase-btn explain-btn';
    btnExplain.textContent = '🔍 コメント全体を解説';
    btnExplain.onclick = () => explainText(c.text, '');

    const btnReg = document.createElement('button');
    btnReg.className = 'phrase-btn';
    btnReg.textContent = '+ 登録';
    btnReg.onclick = () => openAddPhraseModal(null, c.text);

    actions.appendChild(btnExplain);
    actions.appendChild(btnReg);

    div.appendChild(author);
    div.appendChild(textDiv);
    div.appendChild(likes);
    div.appendChild(actions);

    // ポップアップを閉じる
    div.addEventListener('click', () => { popup.style.display = 'none'; });

    el.appendChild(div);
  });
}

  if (data.error) { showApMsg(data.error, 'error'); return; }
  showApMsg('✅ フレーズを登録しました！', 'success');
  showToast('✅ フレーズを登録しました', 'success');
  // フレーズリストを更新
  if (state.currentVideo?.video_id) loadPhrases(state.currentVideo.video_id);
  setTimeout(() => closeAddPhraseModal(), 800);
}

function showApMsg(text, type) {
  const el = document.getElementById('ap-msg');
  el.textContent = text;

  el.style.display = 'block';

// ─────────────────────────────────────────────
// API ユーティリティ
// ─────────────────────────────────────────────
// SRT 取得: srt/{video_id}/{lang} → /api/srt/ エンドポイント、それ以外は /api/subtitle/
async function fetchSRT(path) {
  if (!path) return [];
  try {
    const url = path.startsWith('srt/') ? `/api/${path}` : `/api/subtitle/${path}`;
    const r = await fetch(url);
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

async function apiFetch(url, method = 'GET') {
  try {
    const r = await fetch(url, { method });
    return await r.json();
  } catch { return {}; }
}

async function apiPost(url, body = {}) {
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return await r.json();
  } catch (e) { return { error: String(e) }; }
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// マークダウン → HTML（**bold**, *italic*, 改行）
function mdToHtml(str) {
  return esc(str)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/`(.+?)`/g,       '<code style="background:#E8F4FC;padding:1px 4px;border-radius:3px;font-size:.9em">$1</code>')
    .replace(/\n/g,            '<br>');
}

const studyState = { idx: 0 };

function renderStudyCurrent() {
  const subs = state.subtitlesEN;
  if (!subs.length) {
    document.getElementById('study-en').textContent = '字幕なし';
    document.getElementById('study-ja').textContent = '';
    document.getElementById('study-progress').textContent = '';
    document.getElementById('study-detail-area').innerHTML = '';
    return;
  }

  // 現在の動画時間に最も近いセンテンスを選択
  if (state.currentSubIdx >= 0 && studyState.idx !== state.currentSubIdx) {
    studyState.idx = state.currentSubIdx;
  }
  const i = Math.max(0, Math.min(studyState.idx, subs.length - 1));
  studyState.idx = i;
  const s = subs[i];

  document.getElementById('study-progress').textContent = `${i + 1} / ${subs.length}`;
  document.getElementById('study-en').textContent = s.text;

  const ja = state.subtitlesJA.find(j => s.start >= j.start && s.start < j.end)
           || state.subtitlesJA.find(j => Math.abs(j.start - s.start) < 2.0);
  document.getElementById('study-ja').textContent = ja ? ja.text : '';

  // 動画をそのセンテンスの開始位置に移動してキャプチャ
  video.currentTime = s.start;
  document.getElementById('study-detail-area').innerHTML = '';
  captureAfterSeek();
}

function captureAfterSeek() {
  const canvas = document.getElementById('study-canvas');
  const noShot = document.getElementById('study-no-screenshot');
  const capture = () => {
    if (video.readyState >= 2 && video.videoWidth) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.style.display = 'block';
      noShot.style.display = 'none';
    }
  };
  video.addEventListener('seeked', capture, { once: true });
  // フォールバック: すでにseek済みの場合
  setTimeout(capture, 300);
}

function studyPrev() {
  studyState.idx = Math.max(0, studyState.idx - 1);
  renderStudyCurrent();
}

function studyNext() {
  studyState.idx = Math.min((state.subtitlesEN.length || 1) - 1, studyState.idx + 1);
  renderStudyCurrent();
}

  if (data.usage)   html += `<div class="detail-section"><div class="detail-label">使い方・ニュアンス</div><div class="detail-value">${esc(data.usage)}</div></div>`;
  if (data.etymology) html += `<div class="detail-section"><div class="detail-label">🌱 語源</div><div class="detail-value">${esc(data.etymology)}</div></div>`;
  if (data.linguistics_note) html += `<div class="detail-section"><div class="detail-label">🔬 言語学的考察</div><div class="detail-value" style="font-size:.82rem;color:var(--text-dim)">${esc(data.linguistics_note)}</div></div>`;
  if (data.story) html += `<div class="detail-section"><div class="detail-label">📖 覚え方ストーリー</div><div class="detail-value" style="background:#fffbe6;border-left:3px solid #f0a000;padding:6px 10px;border-radius:4px">${esc(data.story)}</div></div>`;
  if (data.mnemonic) html += `<div class="detail-section"><div class="detail-label">🎵 ゴロ合わせ</div><div class="detail-value" style="background:#e8f4fc;border-left:3px solid var(--blue);padding:6px 10px;border-radius:4px">${esc(data.mnemonic)}</div></div>`;
  if (data.example) html += `<div class="detail-section"><div class="detail-label">例文</div><div class="detail-value"><strong>${esc(data.example)}</strong>${data.example_ja ? '<br><span style="color:var(--text-dim)">' + esc(data.example_ja) + '</span>' : ''}</div></div>`;
  if (data.eiken_note) html += `<div class="detail-section"><div class="detail-label">英検1級メモ</div><div class="detail-value" style="border-left:2px solid var(--warning);padding-left:8px">${esc(data.eiken_note)}</div></div>`;
  if (data.related && data.related.length) html += `<div class="detail-section"><div class="detail-label">関連語</div><div class="detail-tags" id="related-tags-vocab"></div></div>`;

let _dlEs = null;
let _dlJobId = null;
let _dlSuggestedVideoIds = [];  // DLした動画ID一覧

  document.getElementById('dl-overlay').style.display = 'none';

async function startDownload() {
  const urls = document.getElementById('dl-urls').value.trim();
  if (!urls) { alert('URLを入力してください'); return; }

  const body = {
    urls,
    mode:  document.getElementById('dl-mode').value,
    model: document.getElementById('dl-model').value,
    lang:  document.getElementById('dl-lang').value,
    top_n: parseInt(document.getElementById('dl-top').value),
  };

  const btn = document.getElementById('dl-btn-start');
  btn.disabled = true;
  btn.textContent = '実行中…';

  const res = await fetch('/api/download', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = '▶ ダウンロード開始'; return; }

  _dlJobId = data.job_id;
  const logEl    = document.getElementById('dl-log');
  const badgeEl  = document.getElementById('dl-status-badge');
  const logWrap  = document.getElementById('dl-log-wrap');
  const stopBtn  = document.getElementById('dl-btn-stop');
  logEl.textContent = '';
  logWrap.style.display = 'block';
  stopBtn.style.display = 'inline-block';
  badgeEl.textContent = '実行中';
  badgeEl.style.cssText = 'background:#E8F4FC;color:#0055AA;border:1px solid #0055AA;font-size:.68rem;padding:1px 8px;border-radius:20px;font-weight:700;';

  // 進捗状態を追跡
  let _dlPhase = '';
  function _setBadge(text, bg, color, border) {
    badgeEl.textContent = text;
    badgeEl.style.cssText = `background:${bg};color:${color};border:1px solid ${border};font-size:.68rem;padding:1px 8px;border-radius:20px;font-weight:700;`;
  }

  // SSE ストリーム
  if (_dlEs) _dlEs.close();
  _dlEs = new EventSource(`/api/download/stream/${data.job_id}`);
  _dlEs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.line) {
      const line = msg.line;
      const span = document.createElement('span');

      // 進捗フェーズ検出 → バッジ更新
      if (line.includes('動画DL中') || line.includes('[download]')) {
        if (_dlPhase !== 'dl') { _dlPhase = 'dl'; _setBadge('📥 動画DL中', '#fff3e0', '#D4820A', '#D4820A'); }
      } else if (line.includes('字幕') && line.includes('取得')) {
        if (_dlPhase !== 'srt') { _dlPhase = 'srt'; _setBadge('📋 字幕取得中', '#e8f4fc', '#0055AA', '#0055AA'); }
      } else if (line.includes('LLM') || line.includes('解析中') || line.includes('OpenRouter')) {
        if (_dlPhase !== 'llm') { _dlPhase = 'llm'; _setBadge('🤖 LLM解析中', '#f3e8fc', '#7700aa', '#7700aa'); }
      } else if (line.includes('DB') && (line.includes('登録') || line.includes('保存'))) {
        if (_dlPhase !== 'db') { _dlPhase = 'db'; _setBadge('🗄️ DB登録中', '#e8fcef', '#1a7a4a', '#1a7a4a'); }
      }

      // 色分け
      if (line.includes('✓') || line.includes('完了') || line.includes('Done') || line.includes('✅')) {
        span.style.color = '#1a7a4a';
      } else if (line.includes('✗') || line.includes('ERROR') || line.includes('エラー')) {
        span.style.color = '#CC0000';
      } else if (line.includes('⚠') || line.includes('警告') || line.includes('429')) {
        span.style.color = '#D4820A';
      } else if (line.startsWith('  ') || line.startsWith('[download]')) {
        span.style.color = '#5070a0';
      }
      span.textContent = line + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }
    if (msg.done) {
      _dlEs.close(); _dlEs = null;
      stopBtn.style.display = 'none';
      if (msg.status === 'done') {
        _setBadge('✅ 完了', '#e6f4ea', '#1a7a4a', '#1a7a4a');
        document.getElementById('dl-btn-refresh').style.display = 'block';
        showToast('✅ ダウンロード完了！動画リストを更新しました。', 'success');
        loadDates();
        loadWelcomeStats();
        // フレーズ候補を読み込む
        dlLoadSuggestedPhrases();
      } else if (msg.status === 'cancelled') {
        _setBadge('⏹ 停止済み', '#f5f5f5', '#666', '#999');
        showToast('⏹ ダウンロードを停止しました。', 'info');
      } else {
        _setBadge('❌ エラー', '#fdecea', '#CC0000', '#CC0000');
        showToast('❌ ダウンロードでエラーが発生しました。', 'error');
      }
      btn.disabled = false;
      btn.textContent = '▶ 再実行';
    }
  };
  _dlEs.onerror = () => {
    _dlEs.close(); _dlEs = null;
    stopBtn.style.display = 'none';
    _setBadge('接続エラー', '#fdecea', '#CC0000', '#CC0000');
    btn.disabled = false;
    btn.textContent = '▶ 再実行';
  };
}

async function stopDownload() {
  if (!_dlJobId) return;
  const r = await fetch(`/api/download/cancel/${_dlJobId}`, { method: 'POST' });
  const d = await r.json();
  if (d.success) {
    document.getElementById('dl-btn-stop').style.display = 'none';
    document.getElementById('dl-status-badge').textContent = '停止中…';
  }
}

async function dlLoadSuggestedPhrases() {
  // 最近追加された動画（直近24時間）からフレーズ候補を取得
  const dates = await apiFetch('/api/dates');
  if (!dates || !dates.length) return;

  // 最新の日付の動画を取得
  const latestDate = dates[0].date;
  const videos = await apiFetch(`/api/dates/${latestDate}/videos`);
  if (!videos || !videos.length) return;

  let allPhrases = [];
  _dlSuggestedVideoIds = [];
  for (const v of videos.slice(0, 5)) {
    if (!v.video_id) continue;
    const phrases = await apiFetch(`/api/video/${v.video_id}/suggested_phrases`);
    if (Array.isArray(phrases) && phrases.length) {
      phrases.forEach(p => p._video_id = v.video_id);
      allPhrases = allPhrases.concat(phrases);
      _dlSuggestedVideoIds.push(v.video_id);
    }
  }
  if (!allPhrases.length) return;

  const reviewEl = document.getElementById('dl-phrase-review');
  const listEl   = document.getElementById('dl-phrase-list');
  const countEl  = document.getElementById('dl-phrase-count');
  const titleEl  = document.getElementById('dl-phrase-review-title');

  titleEl.textContent = `📚 抽出されたフレーズ (${allPhrases.length}件)`;
  listEl.innerHTML = '';
  allPhrases.forEach((p, i) => {
    const row = document.createElement('label');
    row.style.cssText = 'display:flex;align-items:flex-start;gap:8px;padding:5px 12px;cursor:pointer;border-bottom:1px solid var(--border);';
    row.innerHTML = `
      <input type="checkbox" class="dl-phrase-cb" data-idx="${i}" checked style="margin-top:3px;flex-shrink:0">
      <span style="flex:1;min-width:0">
        <span style="font-size:.82rem;font-weight:700;color:var(--navy)">${mdToHtml(p.en)}</span>
        ${p.ja ? `<span style="font-size:.75rem;color:var(--text-dim);margin-left:6px">${esc(p.ja)}</span>` : ''}
        ${p.is_top ? '<span style="font-size:.65rem;background:#e8f000;color:#333;border-radius:3px;padding:0 4px;margin-left:4px">★</span>' : ''}
      </span>`;
    row._phraseData = p;
    listEl.appendChild(row);
  });

  document.getElementById('dl-phrase-check-all').checked = true;
  countEl.textContent = `${allPhrases.length}件選択中`;
  reviewEl.style.display = 'block';

  // チェックボックス変更時にカウント更新
  listEl.addEventListener('change', () => {
    const checked = listEl.querySelectorAll('.dl-phrase-cb:checked').length;
    countEl.textContent = `${checked}件選択中`;
  });
}

function dlToggleAllPhrases(checked) {
  document.querySelectorAll('.dl-phrase-cb').forEach(cb => cb.checked = checked);
  const total = document.querySelectorAll('.dl-phrase-cb').length;
  document.getElementById('dl-phrase-count').textContent = `${checked ? total : 0}件選択中`;
}

async function dlRegisterSelected() {
  const checked = [...document.querySelectorAll('.dl-phrase-cb:checked')];
  if (!checked.length) { alert('登録するフレーズを選択してください'); return; }

  // video_id ごとにまとめて登録
  const byVideo = {};
  checked.forEach(cb => {
    const row = cb.closest('label');
    const p = row._phraseData;
    const vid = p._video_id;
    if (!byVideo[vid]) byVideo[vid] = [];
    byVideo[vid].push({ en: p.en, ja: p.ja || '', note: p.note || '', is_top: p.is_top || 0 });
  });

  let total = 0;
  for (const [vid, phrases] of Object.entries(byVideo)) {
    const r = await apiPost(`/api/video/${vid}/register_phrases`, { phrases });
    if (r.inserted) total += r.inserted;
  }

  document.getElementById('dl-phrase-review').style.display = 'none';
  showToast(`✅ ${total}件のフレーズを登録しました`, 'success');
  loadVocab?.();
}

function showToast(msg, type = 'info') {
  const colors = {
    success: { bg: '#1a7a4a', icon: '✅' },
    error:   { bg: '#CC0000', icon: '❌' },
    info:    { bg: '#003366', icon: 'ℹ️'  },

  const c = colors[type] || colors.info;
  const toast = document.createElement('div');
  toast.style.cssText = `
    position:fixed; bottom:24px; right:24px; z-index:9999;
    background:${c.bg}; color:#fff; padding:12px 20px;
    border-radius:6px; font-size:.83rem; font-weight:600;
    box-shadow:0 4px 20px rgba(0,0,0,.3); max-width:320px;
    display:flex; align-items:center; gap:8px;
    animation: toastIn .25s ease; font-family:inherit;`;
  toast.innerHTML = `<span>${msg}</span>`;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0'; toast.style.transition = 'opacity .3s';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}
